version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: maptest-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maptest}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - maptest-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TileServer GL for serving map tiles
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: maptest-tileserver
    ports:
      - "${TILESERVER_PORT:-8080}:80"
    volumes:
      - ./tiles:/data/tiles:ro
      - ./tileserver-config.json:/data/config.json:ro
    networks:
      - maptest-network
    depends_on:
      - postgres
    environment:
      - TILESERVER_HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OSRM Routing Server
  osrm:
    image: osrm/osrm-backend:latest
    container_name: maptest-osrm
    ports:
      - "${OSRM_PORT:-5000}:5000"
    volumes:
      - ./osrm-data:/data:ro
    networks:
      - maptest-network
    command: >
      sh -c "
        if [ ! -f /data/india-latest.osrm ]; then
          echo 'OSRM data not found. Please prepare OSRM data first.'
          echo 'See README.md for instructions on preparing OSRM data.'
          exit 1
        fi
        osrm-routed --algorithm mld --ip 0.0.0.0 --port 5000 /data/india-latest.osrm
      "
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/route/v1/driving/78.0,20.0;78.1,20.1?overview=false"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nominatim for geocoding and reverse geocoding
  nominatim:
    image: mediagis/nominatim:4.2
    container_name: maptest-nominatim
    ports:
      - "${NOMINATIM_PORT:-8081}:8080"
    environment:
      PBF_URL: ${NOMINATIM_PBF_URL:-https://download.geofabrik.de/asia/india-latest.osm.pbf}
      REPLICATION_URL: ${NOMINATIM_REPLICATION_URL:-https://download.geofabrik.de/asia/india-updates/}
      IMPORT_WIKIPEDIA: "false"
      NOMINATIM_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - nominatim_data:/var/lib/postgresql/12/main
      - nominatim_flatnode:/flatnodes
    networks:
      - maptest-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/status"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maptest-backend
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-maptest}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - TILESERVER_URL=http://tileserver:80
      - OSRM_URL=http://osrm:5000
      - NOMINATIM_URL=http://nominatim:8080
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - maptest-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: maptest-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - maptest-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: maptest-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - maptest-network
    depends_on:
      - backend
      - tileserver
    restart: unless-stopped

volumes:
  postgres_data:
  nominatim_data:
  nominatim_flatnode:
  redis_data:

networks:
  maptest-network:
    driver: bridge

